<!DOCTYPE html>
<html lang="es" x-data="appBus()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MED BASHA PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        @keyframes amber-pulse {
            0%, 100% { background-color: rgba(245, 158, 11, 0.7); box-shadow: 0 0 0px rgba(245, 158, 11, 0.4); }
            50% { background-color: rgba(245, 158, 11, 1); box-shadow: 0 0 15px rgba(245, 158, 11, 0.7); }
        }
        .animate-amber { animation: amber-pulse 2s infinite; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; transition: all 0.3s ease; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); transition: transform 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .semana-row { background: rgba(59, 130, 246, 0.1); border-left: 3px solid #3b82f6; }
        .mes-cierre { background: #1e293b; border-top: 2px solid #64748b; color: white; }
    </style>
</head>
<body :style="'font-size: ' + settings.fontSize + 'px; font-weight: ' + settings.fontWeight">

    <div x-show="screen === 1" x-cloak class="p-4 max-w-md mx-auto pb-24">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter" :style="'color:' + settings.colorMaestro">MED BASHA PRO</h1>
                <p class="text-[10px] text-slate-500 uppercase font-black">Conductor Menorca • Semana <span x-text="getWeekNumber(new Date())"></span></p>
            </div>
            <button @click="screen = 4; actualizarIconos()" class="p-2 bg-slate-800 rounded-full active:scale-90"><i data-lucide="settings"></i></button>
        </header>

        <div class="glass-card rounded-3xl p-4 mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <button @click="changeMonth(-1)" class="p-2"><i data-lucide="chevron-left"></i></button>
                <h2 class="font-bold text-lg" x-text="monthNames[currentMonth] + ' ' + currentYear"></h2>
                <button @click="changeMonth(1)" class="p-2"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-500 mb-2">
                <span>LU</span><span>MA</span><span>MI</span><span>JU</span><span>VI</span><span>SA</span><span>DO</span>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center">
                <template x-for="day in daysInMonth">
                    <button @click="day.num ? seleccionarDia(day.num) : null" 
                         class="h-10 flex flex-col items-center justify-center rounded-xl relative transition active:scale-90" 
                         :class="[
                            day.isToday ? 'bg-blue-600 font-bold shadow-lg shadow-blue-900/50' : '',
                            selectedDay === day.num ? 'ring-2 ring-yellow-500' : ''
                         ]">
                        <span x-text="day.num"></span>
                        <div class="flex gap-0.5 mt-0.5" x-show="tieneRegistro(day.num)">
                            <div class="bg-green-400 w-1.5 h-1.5 rounded-full"></div>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button @click="openRegistro('continua')" class="glass-card p-6 rounded-3xl flex flex-col items-center gap-3 border-b-4 border-blue-500 active:scale-95 transition">
                <i data-lucide="timer" class="text-blue-500 w-8 h-8"></i>
                <span class="font-black uppercase text-xs">Continua</span>
            </button>
            <button @click="openRegistro('partida')" class="glass-card p-6 rounded-3xl flex flex-col items-center gap-3 border-b-4 border-orange-500 active:scale-95 transition">
                <i data-lucide="split" class="text-orange-500 w-8 h-8"></i>
                <span class="font-black uppercase text-xs">Partida</span>
            </button>
        </div>

        <button @click="screen = 3; actualizarIconos()" class="w-full mt-6 glass-card p-5 rounded-2xl flex justify-between items-center active:bg-white/5">
            <span class="font-bold uppercase text-[10px] tracking-widest">Historial, Cierres y Semanas</span>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-600"></i>
        </button>
    </div>

    <div x-show="screen === 2" x-cloak class="p-4 max-w-md mx-auto pb-44">
        <header class="flex items-center gap-4 mb-6">
            <button @click="screen = 1" class="p-2 bg-slate-800 rounded-full"><i data-lucide="arrow-left"></i></button>
            <div>
                <h2 class="text-xl font-black uppercase tracking-tighter" x-text="selectedDay + ' ' + monthNames[currentMonth]"></h2>
                <p class="text-[9px] text-yellow-500 font-bold uppercase" x-text="form.esPartida ? 'Jornada Partida' : 'Jornada Continua'"></p>
            </div>
        </header>

        <div class="space-y-4">
            <div class="glass-card p-5 rounded-3xl border-l-4 border-blue-500">
                <div class="flex justify-between items-center mb-5">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Turno Mañana</span>
                    <input type="text" x-model="form.bus1" placeholder="BUS" class="w-20 bg-slate-900 border border-white/10 rounded-lg p-2 text-center text-yellow-500 font-black outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-5">
                    <div class="bg-black/20 p-3 rounded-2xl text-center">
                        <label class="text-[8px] font-black text-slate-500 uppercase block mb-1">Entrada</label>
                        <input type="time" x-model="form.hE1" @change="calcular()" class="bg-transparent text-2xl font-black w-full text-blue-400 text-center outline-none">
                    </div>
                    <div class="bg-black/20 p-3 rounded-2xl text-center">
                        <label class="text-[8px] font-black text-slate-500 uppercase block mb-1">Salida</label>
                        <input type="time" x-model="form.hS1" @change="calcular()" class="bg-transparent text-2xl font-black w-full text-blue-400 text-center outline-none">
                    </div>
                </div>
            </div>

            <div x-show="form.esPartida" class="glass-card p-5 rounded-3xl border-l-4 border-orange-500">
                <div class="flex justify-between items-center mb-5">
                    <span class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Turno Tarde</span>
                    <input type="text" x-model="form.bus2" placeholder="BUS" class="w-20 bg-slate-900 border border-white/10 rounded-lg p-2 text-center text-yellow-500 font-black outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-5">
                    <div class="bg-black/20 p-3 rounded-2xl text-center">
                        <label class="text-[8px] font-black text-slate-500 uppercase block mb-1">Entrada</label>
                        <input type="time" x-model="form.hE2" @change="calcular()" class="bg-transparent text-2xl font-black w-full text-orange-400 text-center outline-none">
                    </div>
                    <div class="bg-black/20 p-3 rounded-2xl text-center">
                        <label class="text-[8px] font-black text-slate-500 uppercase block mb-1">Salida</label>
                        <input type="time" x-model="form.hS2" @change="calcular()" class="bg-transparent text-2xl font-black w-full text-orange-400 text-center outline-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <button @click="form.comida = !form.comida" :class="form.comida ? 'bg-green-600 shadow-lg' : (alertaComida ? 'animate-amber' : 'bg-slate-800')" class="p-5 rounded-2xl flex flex-col items-center gap-1 font-black transition-all active:scale-90"><i data-lucide="utensils" class="w-5 h-5"></i><span class="text-[10px] uppercase">Comida</span></button>
                <button @click="form.cena = !form.cena" :class="form.cena ? 'bg-green-600 shadow-lg' : (alertaCena ? 'animate-amber' : 'bg-slate-800')" class="p-5 rounded-2xl flex flex-col items-center gap-1 font-black transition-all active:scale-90"><i data-lucide="moon" class="w-5 h-5"></i><span class="text-[10px] uppercase">Cena</span></button>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full glass-card border-t border-white/10 p-6 z-50">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <div class="text-center">
                    <p class="text-[9px] text-slate-500 font-black uppercase mb-1">Total Horas</p>
                    <span class="text-3xl font-black text-green-400" x-text="res.hTotal">00:00</span>
                </div>
                <button @click="guardarJornada()" :style="'background-color:' + settings.colorMaestro" class="text-white p-5 rounded-full shadow-2xl active:scale-75 transition-transform"><i data-lucide="save" class="w-7 h-7"></i></button>
            </div>
        </div>
    </div>

    <div x-show="screen === 3" x-cloak class="p-4 max-w-md mx-auto pb-24">
        <header class="flex justify-between items-center mb-6">
            <button @click="screen = 1" class="p-2 bg-slate-800 rounded-full"><i data-lucide="arrow-left"></i></button>
            <h2 class="text-xl font-black uppercase tracking-tighter">Historial Nómina</h2>
            <button @click="enviarASheets()" class="p-2 bg-blue-600 rounded-full shadow-lg active:scale-90"><i data-lucide="cloud-upload"></i></button>
        </header>

        <div class="space-y-8">
            <template x-for="mesKey in getMesesUnicos()" :key="mesKey">
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-2">
                        <span class="bg-blue-600/20 px-4 py-1.5 rounded-full text-[10px] font-black uppercase text-blue-400 tracking-widest" x-text="mesKey"></span>
                    </div>

                    <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[8px] text-slate-500 font-black uppercase">
                                <tr>
                                    <th class="p-4">Día / Sem</th>
                                    <th class="text-center">Bus</th>
                                    <th class="text-center">Hrs.</th>
                                    <th class="text-center">Noc.</th>
                                    <th class="text-right p-4">Dietas</th>
                                </tr>
                            </thead>
                            <tbody class="text-[10px] font-bold divide-y divide-white/5">
                                <template x-for="item in getRegistrosPorMes(mesKey)" :key="item.id">
                                    <tr>
                                        <td class="p-4">
                                            <div class="flex flex-col">
                                                <span x-text="item.fecha"></span>
                                                <span class="text-[7px] text-blue-400 uppercase">Semana <span x-text="item.semana"></span></span>
                                            </div>
                                        </td>
                                        <td class="text-center"><span class="bg-yellow-500/10 text-yellow-500 px-1.5 py-0.5 rounded" x-text="item.bus"></span></td>
                                        <td class="text-center" x-text="item.horas"></td>
                                        <td class="text-center text-blue-200/60" x-text="item.noct"></td>
                                        <td class="text-right p-4 text-green-400" x-text="item.dietas"></td>
                                    </tr>
                                </template>
                            </tbody>
                            <tfoot class="mes-cierre font-black">
                                <tr>
                                    <td colspan="2" class="p-4 text-[9px] uppercase tracking-tighter">CIERRE TOTAL 30/31</td>
                                    <td class="text-center" x-text="sumarMes(mesKey, 'horas')"></td>
                                    <td class="text-center" x-text="sumarMes(mesKey, 'noct')"></td>
                                    <td class="text-right p-4" x-text="sumarMes(mesKey, 'dietas')"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="screen === 4" x-cloak class="p-4 max-w-md mx-auto">
        <header class="flex items-center gap-4 mb-8">
            <button @click="screen = 1" class="p-2 bg-slate-800 rounded-full"><i data-lucide="arrow-left"></i></button>
            <h2 class="text-xl font-black uppercase tracking-tighter">Ajustes</h2>
        </header>
        <div class="space-y-6">
            <div class="glass-card p-5 rounded-3xl">
                <label class="text-[10px] font-black text-slate-500 block mb-5 uppercase tracking-widest">Identidad Visual (Gris Maestro)</label>
                <div class="flex justify-between px-2">
                    <template x-for="color in palette">
                        <button @click="settings.colorMaestro = color" class="color-dot" :style="'background-color:' + color" :class="settings.colorMaestro === color ? 'active' : ''"></button>
                    </template>
                </div>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <label class="text-[10px] font-black text-slate-500 block mb-4 uppercase tracking-widest text-center">Estilo de Texto</label>
                <input type="range" x-model="settings.fontSize" min="14" max="24" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500 mb-6">
                <div class="flex gap-2">
                    <button @click="settings.fontWeight = 'normal'" :class="settings.fontWeight === 'normal' ? 'bg-blue-600' : 'bg-slate-800'" class="flex-1 p-3 rounded-xl text-[10px] font-black uppercase transition">Fina</button>
                    <button @click="settings.fontWeight = 'bold'" :class="settings.fontWeight === 'bold' ? 'bg-blue-600' : 'bg-slate-800'" class="flex-1 p-3 rounded-xl text-[10px] font-black uppercase transition">Negrita</button>
                </div>
            </div>
            <button @click="if(confirm('¿Reiniciar todo?')) { historial = []; localStorage.removeItem('historial_bus'); }" class="w-full p-4 text-[10px] font-black uppercase text-red-500 opacity-50">Resetear App</button>
        </div>
    </div>

    <script>
        function appBus() {
            return {
                screen: 1, currentMonth: new Date().getMonth(), currentYear: new Date().getFullYear(),
                selectedDay: new Date().getDate(),
                monthNames: ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"],
                daysInMonth: [], 
                palette: ['#71717a', '#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#a855f7'],
                settings: { fontSize: 16, fontWeight: 'normal', colorMaestro: '#71717a', sheetUrl: '' },
                form: { esPartida: false, bus1: '', hE1: '', hS1: '', bus2: '', hE2: '', hS2: '', comida: false, cena: false },
                res: { hTotal: '00:00', totalMinutos: 0, hNoct: 0 },
                alertaComida: false, alertaCena: false,
                historial: JSON.parse(localStorage.getItem('historial_bus') || '[]'),

                init() { this.renderCalendar(); this.actualizarIconos(); },
                
                renderCalendar() {
                    let first = new Date(this.currentYear, this.currentMonth, 1).getDay();
                    let days = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
                    first = (first === 0) ? 6 : first - 1;
                    this.daysInMonth = [];
                    for (let i = 0; i < first; i++) this.daysInMonth.push({ num: null });
                    for (let i = 1; i <= days; i++) {
                        this.daysInMonth.push({ 
                            num: i, 
                            isToday: new Date().toDateString() === new Date(this.currentYear, this.currentMonth, i).toDateString()
                        });
                    }
                },

                seleccionarDia(n) { this.selectedDay = n; },
                changeMonth(s) { this.currentMonth += s; if(this.currentMonth > 11) { this.currentMonth = 0; this.currentYear++; } else if(this.currentMonth < 0) { this.currentMonth = 11; this.currentYear--; } this.renderCalendar(); },
                
                openRegistro(t) { 
                    this.form.esPartida = (t === 'partida'); 
                    this.screen = 2; 
                    this.actualizarIconos(); 
                },

                calcular() {
                    const toM = (t) => { if(!t) return 0; let [h,m] = t.split(':').map(Number); return h*60+m; };
                    let m1 = (toM(this.form.hS1) < toM(this.form.hE1)) ? (toM(this.form.hS1)+1440) - toM(this.form.hE1) : toM(this.form.hS1) - toM(this.form.hE1);
                    if(!this.form.hE1 || !this.form.hS1) m1 = 0;
                    let m2 = 0; if(this.form.esPartida) { m2 = (toM(this.form.hS2) < toM(this.form.hE2)) ? (toM(this.form.hS2)+1440) - toM(this.form.hE2) : toM(this.form.hS2) - toM(this.form.hE2); if(!this.form.hE2 || !this.form.hS2) m2 = 0; }
                    this.res.totalMinutos = m1 + m2;
                    let finalMins = (this.res.totalMinutos > 0 && this.res.totalMinutos < 360) ? 360 : this.res.totalMinutos;
                    this.res.hTotal = `${Math.floor(finalMins/60).toString().padStart(2, '0')}:${(finalMins%60).toString().padStart(2, '0')}`;
                    
                    let hFin = (this.form.esPartida && this.form.hS2) ? this.form.hS2 : this.form.hS1;
                    let mf = toM(hFin);
                    this.form.comida = (mf >= 930 || this.res.totalMinutos/60 >= 9);
                    this.form.cena = (mf >= 1380);
                    this.alertaComida = (mf >= 900 && mf < 930);
                    this.alertaCena = (mf >= 1350 && mf < 1380);

                    // Nocturnidad simple (22:00 a 06:00)
                    this.res.hNoct = (this.calcNoc(this.form.hE1, this.form.hS1) + (this.form.esPartida ? this.calcNoc(this.form.hE2, this.form.hS2) : 0)).toFixed(2);
                },

                calcNoc(e, s) {
                    if(!e || !s) return 0;
                    const toM = (t) => { let [h,m] = t.split(':').map(Number); return h*60+m; };
                    let mE = toM(e), mS = toM(s);
                    if(mS < mE) mS += 1440;
                    let overlap = Math.max(0, Math.min(mS, 1800) - Math.max(mE, 1320)); // Entre 22h y 06h (1320 a 1800 min)
                    if(mS > 1440) overlap += Math.max(0, Math.min(mS, 360) - Math.max(mE, 0));
                    return overlap / 60;
                },

                guardarJornada() {
                    if(!this.form.bus1) { alert("¡Aviso: Falta el número de BUS!"); return; }
                    let fechaObj = new Date(this.currentYear, this.currentMonth, this.selectedDay);
                    this.historial.unshift({
                        id: Date.now(),
                        fecha: `${this.selectedDay} ${this.monthNames[this.currentMonth]}`,
                        bus: this.form.bus1,
                        horas: this.res.hTotal,
                        noct: this.res.hNoct,
                        dietas: (this.form.comida?1:0) + (this.form.cena?1:0),
                        semana: this.getWeekNumber(fechaObj),
                        mesKey: this.monthNames[this.currentMonth] + " " + this.currentYear
                    });
                    localStorage.setItem('historial_bus', JSON.stringify(this.historial));
                    this.screen = 3;
                    this.actualizarIconos();
                },

                getMesesUnicos() { return [...new Set(this.historial.map(h => h.mesKey))]; },
                getRegistrosPorMes(m) { return this.historial.filter(h => h.mesKey === m); },
                
                sumarMes(m, campo) {
                    let regs = this.getRegistrosPorMes(m);
                    if(campo === 'dietas') return regs.reduce((a, h) => a + h.dietas, 0);
                    if(campo === 'noct') return regs.reduce((a, h) => a + parseFloat(h.noct), 0).toFixed(2);
                    let totalMins = regs.reduce((a, h) => { let [hh, mm] = h.horas.split(':').map(Number); return a + (hh*60+mm); }, 0);
                    return `${Math.floor(totalMins/60)}h ${totalMins%60}m`;
                },

                getWeekNumber(d) {
                    let t = new Date(d.getTime()); t.setHours(0,0,0,0);
                    t.setDate(t.getDate() + 3 - (t.getDay() + 6) % 7);
                    let w1 = new Date(t.getFullYear(), 0, 4);
                    return 1 + Math.round(((t.getTime() - w1.getTime()) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
                },

                tieneRegistro(n) { return this.historial.some(h => h.fecha.startsWith(n + ' ')); },
                enviarASheets() { alert("Sincronizando registros..."); },
                actualizarIconos() { this.$nextTick(() => lucide.createIcons()); }
            }
        }
    </script>
</body>
</html>
